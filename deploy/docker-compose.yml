# WIRE platform: Postgres + Redis + migrations + API + reconstruction worker.
#
#   cp ../.env.example ../.env   # then set JWT_SECRET_KEY and POSTGRES_PASSWORD
#   docker compose --env-file ../.env up --build
#
# The API and worker share one image (built from the repo-root Dockerfile) and
# one `wire-output` volume: the worker writes reconstruction artifacts there
# and the API serves them. Scale workers with:
#   docker compose up --scale worker=3
# (safe: jobs are claimed with guarded updates + claim tokens, and rate
# limiting is shared through Redis).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wire
      POSTGRES_USER: wire
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - wire-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wire -d wire"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: ..
    command: ["alembic", "upgrade", "head"]
    environment:
      # Alembic runs sync migrations over the async URL translated by env.py;
      # keep in lockstep with the api/worker DATABASE_URL.
      DATABASE_URL: postgresql+asyncpg://wire:${POSTGRES_PASSWORD}@db:5432/wire
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: ..
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://wire:${POSTGRES_PASSWORD}@db:5432/wire
      WIRE_REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
      WIRE_CORS_ORIGINS: ${WIRE_CORS_ORIGINS:-http://localhost:5173}
      WIRE_ENABLE_HSTS: ${WIRE_ENABLE_HSTS:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - wire-output:/app/output
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: ..
    command: ["python", "-m", "wire.worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://wire:${POSTGRES_PASSWORD}@db:5432/wire
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - wire-output:/app/output
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  wire-pgdata:
  wire-output:
